name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · typecheck · tests · migration check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Build-time vars required by Vite. Use harmless placeholders for CI;
      # production values live on the VPS.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'ci-placeholder-publishable-key' }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'ci-placeholder' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests (if present)
        run: |
          if npx --no-install vitest --version >/dev/null 2>&1; then
            npx vitest run --reporter=default
          else
            echo "No vitest configured — skipping unit tests."
          fi

      - name: DB migration check
        run: |
          if [ ! -d supabase/migrations ]; then
            echo "No supabase/migrations directory — skipping."
            exit 0
          fi

          fail=0

          # 1. Every migration file must be a non-empty .sql file with a sortable
          #    timestamp prefix (Supabase convention: YYYYMMDDHHMMSS_*.sql).
          for f in supabase/migrations/*.sql; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            if ! echo "$base" | grep -Eq '^[0-9]{14}_.+\.sql$'; then
              echo "::error file=$f::migration filename must match YYYYMMDDHHMMSS_name.sql"
              fail=1
            fi
            if [ ! -s "$f" ]; then
              echo "::error file=$f::migration is empty"
              fail=1
            fi
          done

          # 2. Every CREATE TABLE public.X must be followed (in the same file)
          #    by a GRANT statement mentioning that table — required by the
          #    Supabase Data API or PostgREST returns permission errors.
          missing=$(node -e '
            const fs = require("fs"); const path = require("path");
            const dir = "supabase/migrations";
            let bad = 0;
            for (const f of fs.readdirSync(dir).filter(x => x.endsWith(".sql"))) {
              const sql = fs.readFileSync(path.join(dir, f), "utf8");
              const tables = [...sql.matchAll(/create\s+table\s+(?:if\s+not\s+exists\s+)?public\.([a-z0-9_]+)/gi)].map(m => m[1]);
              for (const t of tables) {
                const re = new RegExp("grant\\s+[^;]+\\s+on\\s+(?:table\\s+)?public\\." + t + "\\b", "i");
                if (!re.test(sql)) { console.log(f + ": missing GRANT for public." + t); bad++; }
              }
            }
            process.exit(bad ? 1 : 0);
          ') || fail=1

          # 3. Forbid ALTER DATABASE statements (rejected by Cloud).
          if grep -RinE '^\s*alter\s+database\b' supabase/migrations; then
            echo "::error::ALTER DATABASE is forbidden in migrations"
            fail=1
          fi

          if [ $fail -ne 0 ]; then exit 1; fi
          echo "Migration check OK"
